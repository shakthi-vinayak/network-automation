[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=python
    --cov=bots
    --cov-report=term-missing
    --cov-report=html:reports/coverage
    --cov-report=xml:reports/coverage.xml
markers =
    unit: Unit tests (no network access required)
    integration: Integration tests (may require network devices)
    slow: Slow-running tests
    molecule: Molecule role tests
    batfish: Batfish network analysis tests
    compliance: Compliance policy tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
