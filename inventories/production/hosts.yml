---
# =============================================================================
# Production Inventory - Enterprise Network Automation Platform
# =============================================================================
# Multi-region production environment with full redundancy.
# All devices use SSH-only, SNMPv3, and vault-managed credentials.
# =============================================================================
all:
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: auto
    environment: production
    vault_provider: hashivault
    backup_enabled: true
    backup_schedule: "0 2 * * *"
    backup_retention_days: 90
    monitoring_enabled: true
    syslog_severity: informational

  children:
    # =========================================================================
    # Core Routers - Backbone routing infrastructure
    # =========================================================================
    core_routers:
      vars:
        role: core_router
        device_type: router
        routing_protocols:
          - ospf
          - bgp
          - isis
      hosts:
        core-rtr-01-us-east:
          ansible_host: 10.0.1.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dc1
          model: ASR-1001-X
          ha_role: primary
          asn: 65001
        core-rtr-02-us-east:
          ansible_host: 10.0.1.2
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dc1
          model: ASR-1001-X
          ha_role: secondary
          asn: 65001
        core-rtr-01-us-west:
          ansible_host: 10.1.1.1
          vendor: cisco
          platform: ios-xe
          region: us-west
          site: dc2
          model: ASR-1001-X
          ha_role: primary
          asn: 65002
        core-rtr-02-us-west:
          ansible_host: 10.1.1.2
          vendor: cisco
          platform: ios-xe
          region: us-west
          site: dc2
          model: ASR-1001-X
          ha_role: secondary
          asn: 65002
        core-rtr-01-eu:
          ansible_host: 10.2.1.1
          vendor: juniper
          platform: mx
          region: eu-west
          site: dc3
          model: MX240
          ha_role: primary
          asn: 65003
        core-rtr-02-eu:
          ansible_host: 10.2.1.2
          vendor: juniper
          platform: mx
          region: eu-west
          site: dc3
          model: MX240
          ha_role: secondary
          asn: 65003

    # =========================================================================
    # Distribution Switches - Aggregation layer
    # =========================================================================
    distribution_switches:
      vars:
        role: distribution_switch
        device_type: switch
      hosts:
        dist-sw-01-us-east:
          ansible_host: 10.0.2.1
          vendor: arista
          platform: eos
          region: us-east
          site: dc1
          model: DCS-7050X3
          ha_role: primary
        dist-sw-02-us-east:
          ansible_host: 10.0.2.2
          vendor: arista
          platform: eos
          region: us-east
          site: dc1
          model: DCS-7050X3
          ha_role: secondary
        dist-sw-01-us-west:
          ansible_host: 10.1.2.1
          vendor: cisco
          platform: nx-os
          region: us-west
          site: dc2
          model: Nexus-9336C-FX2
          ha_role: primary
        dist-sw-02-us-west:
          ansible_host: 10.1.2.2
          vendor: cisco
          platform: nx-os
          region: us-west
          site: dc2
          model: Nexus-9336C-FX2
          ha_role: secondary
        dist-sw-01-eu:
          ansible_host: 10.2.2.1
          vendor: arista
          platform: eos
          region: eu-west
          site: dc3
          model: DCS-7050X3
          ha_role: primary
        dist-sw-02-eu:
          ansible_host: 10.2.2.2
          vendor: arista
          platform: eos
          region: eu-west
          site: dc3
          model: DCS-7050X3
          ha_role: secondary

    # =========================================================================
    # Access Switches - Edge connectivity
    # =========================================================================
    access_switches:
      vars:
        role: access_switch
        device_type: switch
      hosts:
        acc-sw-01-us-east:
          ansible_host: 10.0.3.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dc1
          model: C9300-48P
        acc-sw-02-us-east:
          ansible_host: 10.0.3.2
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dc1
          model: C9300-48P
        acc-sw-03-us-east:
          ansible_host: 10.0.3.3
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dc1
          model: C9300-48T
        acc-sw-01-us-west:
          ansible_host: 10.1.3.1
          vendor: cisco
          platform: ios-xe
          region: us-west
          site: dc2
          model: C9300-48P
        acc-sw-02-us-west:
          ansible_host: 10.1.3.2
          vendor: cisco
          platform: ios-xe
          region: us-west
          site: dc2
          model: C9300-48P
        acc-sw-01-eu:
          ansible_host: 10.2.3.1
          vendor: cisco
          platform: ios-xe
          region: eu-west
          site: dc3
          model: C9300-48P
        acc-sw-02-eu:
          ansible_host: 10.2.3.2
          vendor: cisco
          platform: ios-xe
          region: eu-west
          site: dc3
          model: C9300-48P

    # =========================================================================
    # Firewalls - Perimeter and internal segmentation
    # =========================================================================
    firewalls:
      vars:
        role: firewall
        device_type: firewall
      hosts:
        fw-edge-01-us-east:
          ansible_host: 10.0.4.1
          vendor: paloalto
          platform: panos
          region: us-east
          site: dc1
          model: PA-5220
          ha_role: active
        fw-edge-02-us-east:
          ansible_host: 10.0.4.2
          vendor: paloalto
          platform: panos
          region: us-east
          site: dc1
          model: PA-5220
          ha_role: passive
        fw-int-01-us-east:
          ansible_host: 10.0.4.3
          vendor: paloalto
          platform: panos
          region: us-east
          site: dc1
          model: PA-3220
          ha_role: active
        fw-edge-01-us-west:
          ansible_host: 10.1.4.1
          vendor: fortinet
          platform: fortios
          region: us-west
          site: dc2
          model: FortiGate-600E
          ha_role: primary
        fw-edge-02-us-west:
          ansible_host: 10.1.4.2
          vendor: fortinet
          platform: fortios
          region: us-west
          site: dc2
          model: FortiGate-600E
          ha_role: secondary
        fw-edge-01-eu:
          ansible_host: 10.2.4.1
          vendor: checkpoint
          platform: gaia
          region: eu-west
          site: dc3
          model: 6200
          ha_role: active
        fw-edge-02-eu:
          ansible_host: 10.2.4.2
          vendor: checkpoint
          platform: gaia
          region: eu-west
          site: dc3
          model: 6200
          ha_role: standby

    # =========================================================================
    # WAN Edge - MPLS and SD-WAN
    # =========================================================================
    wan_edge:
      vars:
        role: wan_edge
        device_type: router
      hosts:
        wan-rtr-01-us-east:
          ansible_host: 10.0.5.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dc1
          model: ISR-4451
          ha_role: primary
        wan-rtr-02-us-east:
          ansible_host: 10.0.5.2
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dc1
          model: ISR-4451
          ha_role: secondary
        wan-rtr-01-us-west:
          ansible_host: 10.1.5.1
          vendor: cisco
          platform: ios-xe
          region: us-west
          site: dc2
          model: ISR-4451
          ha_role: primary
        wan-rtr-01-eu:
          ansible_host: 10.2.5.1
          vendor: juniper
          platform: srx
          region: eu-west
          site: dc3
          model: SRX4600
          ha_role: primary

    # =========================================================================
    # Internet Edge - BGP peering with ISPs
    # =========================================================================
    internet_edge:
      vars:
        role: internet_edge
        device_type: router
      hosts:
        inet-rtr-01-us-east:
          ansible_host: 10.0.6.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dc1
          model: ASR-1001-X
          ha_role: primary
        inet-rtr-02-us-east:
          ansible_host: 10.0.6.2
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dc1
          model: ASR-1001-X
          ha_role: secondary
        inet-rtr-01-us-west:
          ansible_host: 10.1.6.1
          vendor: cisco
          platform: ios-xe
          region: us-west
          site: dc2
          model: ASR-1001-X
          ha_role: primary

    # =========================================================================
    # VPN Gateways - Remote access and site-to-site VPN
    # =========================================================================
    vpn_gateways:
      vars:
        role: vpn_gateway
        device_type: firewall
      hosts:
        vpn-01-us-east:
          ansible_host: 10.0.7.1
          vendor: paloalto
          platform: panos
          region: us-east
          site: dc1
          model: PA-3220
          ha_role: active
        vpn-02-us-east:
          ansible_host: 10.0.7.2
          vendor: paloalto
          platform: panos
          region: us-east
          site: dc1
          model: PA-3220
          ha_role: passive
        vpn-01-us-west:
          ansible_host: 10.1.7.1
          vendor: fortinet
          platform: fortios
          region: us-west
          site: dc2
          model: FortiGate-200F
          ha_role: primary

    # =========================================================================
    # Load Balancers - Application delivery
    # =========================================================================
    load_balancers:
      vars:
        role: load_balancer
        device_type: load_balancer
      hosts:
        lb-01-us-east:
          ansible_host: 10.0.8.1
          vendor: f5
          platform: bigip
          region: us-east
          site: dc1
          model: BIG-IP-i5800
          ha_role: active
        lb-02-us-east:
          ansible_host: 10.0.8.2
          vendor: f5
          platform: bigip
          region: us-east
          site: dc1
          model: BIG-IP-i5800
          ha_role: standby
        lb-01-us-west:
          ansible_host: 10.1.8.1
          vendor: f5
          platform: bigip
          region: us-west
          site: dc2
          model: BIG-IP-i5800
          ha_role: active
        lb-02-us-west:
          ansible_host: 10.1.8.2
          vendor: f5
          platform: bigip
          region: us-west
          site: dc2
          model: BIG-IP-i5800
          ha_role: standby

    # =========================================================================
    # Wireless Controllers
    # =========================================================================
    wireless_controllers:
      vars:
        role: wireless_controller
        device_type: wireless
      hosts:
        wlc-01-us-east:
          ansible_host: 10.0.9.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dc1
          model: C9800-40
          ha_role: primary
        wlc-02-us-east:
          ansible_host: 10.0.9.2
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dc1
          model: C9800-40
          ha_role: secondary
        wlc-01-us-west:
          ansible_host: 10.1.9.1
          vendor: cisco
          platform: ios-xe
          region: us-west
          site: dc2
          model: C9800-40
          ha_role: primary

    # =========================================================================
    # Regional Groupings
    # =========================================================================
    us_east:
      children:
        core_routers:
        distribution_switches:
        access_switches:
        firewalls:
        wan_edge:
        internet_edge:
        vpn_gateways:
        load_balancers:
        wireless_controllers:
      vars:
        region: us-east

    us_west:
      children:
        core_routers:
        distribution_switches:
        access_switches:
        firewalls:
        wan_edge:
        internet_edge:
        vpn_gateways:
        load_balancers:
        wireless_controllers:
      vars:
        region: us-west

    eu_west:
      children:
        core_routers:
        distribution_switches:
        access_switches:
        firewalls:
        wan_edge:
        load_balancers:
        wireless_controllers:
      vars:
        region: eu-west
