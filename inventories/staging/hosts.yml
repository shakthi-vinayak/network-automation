---
# =============================================================================
# Staging Inventory - Pre-production validation environment
# =============================================================================
all:
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: auto
    environment: staging
    vault_provider: hashivault
    backup_enabled: true
    backup_schedule: "0 3 * * *"
    backup_retention_days: 30
    monitoring_enabled: true
    syslog_severity: notification

  children:
    core_routers:
      vars:
        role: core_router
        device_type: router
      hosts:
        stg-core-rtr-01:
          ansible_host: 172.16.1.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: stg1
          model: CSR1000v
          ha_role: primary
          asn: 65200
        stg-core-rtr-02:
          ansible_host: 172.16.1.2
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: stg1
          model: CSR1000v
          ha_role: secondary
          asn: 65200

    distribution_switches:
      vars:
        role: distribution_switch
        device_type: switch
      hosts:
        stg-dist-sw-01:
          ansible_host: 172.16.2.1
          vendor: arista
          platform: eos
          region: us-east
          site: stg1
          model: DCS-7050X3
          ha_role: primary
        stg-dist-sw-02:
          ansible_host: 172.16.2.2
          vendor: arista
          platform: eos
          region: us-east
          site: stg1
          model: DCS-7050X3
          ha_role: secondary

    access_switches:
      vars:
        role: access_switch
        device_type: switch
      hosts:
        stg-acc-sw-01:
          ansible_host: 172.16.3.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: stg1
          model: C9300-48P

    firewalls:
      vars:
        role: firewall
        device_type: firewall
      hosts:
        stg-fw-01:
          ansible_host: 172.16.4.1
          vendor: paloalto
          platform: panos
          region: us-east
          site: stg1
          model: PA-VM
          ha_role: active
        stg-fw-02:
          ansible_host: 172.16.4.2
          vendor: paloalto
          platform: panos
          region: us-east
          site: stg1
          model: PA-VM
          ha_role: passive

    wan_edge:
      vars:
        role: wan_edge
        device_type: router
      hosts:
        stg-wan-rtr-01:
          ansible_host: 172.16.5.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: stg1
          model: ISR-4431
          ha_role: primary

    internet_edge:
      vars:
        role: internet_edge
        device_type: router
      hosts:
        stg-inet-rtr-01:
          ansible_host: 172.16.6.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: stg1
          model: CSR1000v
          ha_role: primary

    vpn_gateways:
      vars:
        role: vpn_gateway
        device_type: firewall
      hosts:
        stg-vpn-01:
          ansible_host: 172.16.7.1
          vendor: fortinet
          platform: fortios
          region: us-east
          site: stg1
          model: FortiGate-VM
          ha_role: primary

    load_balancers:
      vars:
        role: load_balancer
        device_type: load_balancer
      hosts:
        stg-lb-01:
          ansible_host: 172.16.8.1
          vendor: f5
          platform: bigip
          region: us-east
          site: stg1
          model: BIG-IP-VE
          ha_role: active
        stg-lb-02:
          ansible_host: 172.16.8.2
          vendor: f5
          platform: bigip
          region: us-east
          site: stg1
          model: BIG-IP-VE
          ha_role: standby
