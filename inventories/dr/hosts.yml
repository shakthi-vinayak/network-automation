---
# =============================================================================
# DR (Disaster Recovery) Inventory
# =============================================================================
# Standby DR environment for failover. Mirrors production topology
# at reduced scale. Activated only during disaster events.
# =============================================================================
all:
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: auto
    environment: dr
    vault_provider: hashivault
    backup_enabled: true
    backup_schedule: "0 4 * * *"
    backup_retention_days: 60
    monitoring_enabled: true
    syslog_severity: warning
    dr_mode: standby

  children:
    core_routers:
      vars:
        role: core_router
        device_type: router
      hosts:
        dr-core-rtr-01:
          ansible_host: 10.100.1.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dr1
          model: ASR-1001-X
          ha_role: standalone
          asn: 65300

    distribution_switches:
      vars:
        role: distribution_switch
        device_type: switch
      hosts:
        dr-dist-sw-01:
          ansible_host: 10.100.2.1
          vendor: arista
          platform: eos
          region: us-east
          site: dr1
          model: DCS-7050X3
          ha_role: standalone

    access_switches:
      vars:
        role: access_switch
        device_type: switch
      hosts:
        dr-acc-sw-01:
          ansible_host: 10.100.3.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dr1
          model: C9300-48P

    firewalls:
      vars:
        role: firewall
        device_type: firewall
      hosts:
        dr-fw-01:
          ansible_host: 10.100.4.1
          vendor: paloalto
          platform: panos
          region: us-east
          site: dr1
          model: PA-5220
          ha_role: standalone

    wan_edge:
      vars:
        role: wan_edge
        device_type: router
      hosts:
        dr-wan-rtr-01:
          ansible_host: 10.100.5.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dr1
          model: ISR-4451
          ha_role: standalone

    internet_edge:
      vars:
        role: internet_edge
        device_type: router
      hosts:
        dr-inet-rtr-01:
          ansible_host: 10.100.6.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: dr1
          model: ASR-1001-X
          ha_role: standalone

    vpn_gateways:
      vars:
        role: vpn_gateway
        device_type: firewall
      hosts:
        dr-vpn-01:
          ansible_host: 10.100.7.1
          vendor: paloalto
          platform: panos
          region: us-east
          site: dr1
          model: PA-3220
          ha_role: standalone

    load_balancers:
      vars:
        role: load_balancer
        device_type: load_balancer
      hosts:
        dr-lb-01:
          ansible_host: 10.100.8.1
          vendor: f5
          platform: bigip
          region: us-east
          site: dr1
          model: BIG-IP-i5800
          ha_role: standalone
