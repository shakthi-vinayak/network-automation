---
# =============================================================================
# Lab Inventory - Enterprise Network Automation Platform
# =============================================================================
# Lab environment for development, testing, and validation.
# Uses virtual devices and reduced HA pairs.
# =============================================================================
all:
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: auto
    environment: lab
    vault_provider: env_vars
    backup_enabled: false
    monitoring_enabled: true
    syslog_severity: debugging

  children:
    core_routers:
      vars:
        role: core_router
        device_type: router
      hosts:
        lab-core-rtr-01:
          ansible_host: 192.168.1.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: lab1
          model: CSR1000v
          ha_role: standalone
          asn: 65100
        lab-core-rtr-02:
          ansible_host: 192.168.1.2
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: lab1
          model: CSR1000v
          ha_role: standalone
          asn: 65100

    distribution_switches:
      vars:
        role: distribution_switch
        device_type: switch
      hosts:
        lab-dist-sw-01:
          ansible_host: 192.168.2.1
          vendor: arista
          platform: eos
          region: us-east
          site: lab1
          model: vEOS
          ha_role: standalone
        lab-dist-sw-02:
          ansible_host: 192.168.2.2
          vendor: cisco
          platform: nx-os
          region: us-east
          site: lab1
          model: Nexus-9000v
          ha_role: standalone

    access_switches:
      vars:
        role: access_switch
        device_type: switch
      hosts:
        lab-acc-sw-01:
          ansible_host: 192.168.3.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: lab1
          model: C9300v
        lab-acc-sw-02:
          ansible_host: 192.168.3.2
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: lab1
          model: C9300v

    firewalls:
      vars:
        role: firewall
        device_type: firewall
      hosts:
        lab-fw-01:
          ansible_host: 192.168.4.1
          vendor: paloalto
          platform: panos
          region: us-east
          site: lab1
          model: PA-VM
          ha_role: standalone
        lab-fw-02:
          ansible_host: 192.168.4.2
          vendor: fortinet
          platform: fortios
          region: us-east
          site: lab1
          model: FortiGate-VM
          ha_role: standalone

    wan_edge:
      vars:
        role: wan_edge
        device_type: router
      hosts:
        lab-wan-rtr-01:
          ansible_host: 192.168.5.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: lab1
          model: CSR1000v
          ha_role: standalone

    internet_edge:
      vars:
        role: internet_edge
        device_type: router
      hosts:
        lab-inet-rtr-01:
          ansible_host: 192.168.6.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: lab1
          model: CSR1000v
          ha_role: standalone

    vpn_gateways:
      vars:
        role: vpn_gateway
        device_type: firewall
      hosts:
        lab-vpn-01:
          ansible_host: 192.168.7.1
          vendor: paloalto
          platform: panos
          region: us-east
          site: lab1
          model: PA-VM
          ha_role: standalone

    load_balancers:
      vars:
        role: load_balancer
        device_type: load_balancer
      hosts:
        lab-lb-01:
          ansible_host: 192.168.8.1
          vendor: f5
          platform: bigip
          region: us-east
          site: lab1
          model: BIG-IP-VE
          ha_role: standalone

    wireless_controllers:
      vars:
        role: wireless_controller
        device_type: wireless
      hosts:
        lab-wlc-01:
          ansible_host: 192.168.9.1
          vendor: cisco
          platform: ios-xe
          region: us-east
          site: lab1
          model: C9800-CL
          ha_role: standalone
